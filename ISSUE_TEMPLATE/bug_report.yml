name: Bug report
description: Report a reproducible defect
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, personal data or vulnerability details. Use the private security process for vulnerabilities.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: "1. Configure...\n2. Run...\n3. Observe..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime, browser, database and deployment mode as relevant.
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove credentials, tokens, personal data and customer data.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched for an existing issue.
          required: true
        - label: This is not a security vulnerability.
          required: true
