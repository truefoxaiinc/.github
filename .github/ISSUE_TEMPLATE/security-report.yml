name: Security report guidance
description: Learn how to report a vulnerability privately
title: "Do not submit security details here"
labels: ["security"]
body:
  - type: markdown
    attributes:
      value: |
        **Do not disclose vulnerability details in this public form.**

        Use GitHub private vulnerability reporting when available, or email **security@YOUR-DOMAIN.com**. This placeholder must be replaced before use.
  - type: checkboxes
    id: acknowledgement
    attributes:
      label: Acknowledgement
      options:
        - label: I will use the private reporting channel and will not submit this public issue.
          required: true
