name: Documentation improvement
description: Report unclear, incomplete or incorrect documentation
title: "[Docs]: "
labels: ["documentation", "triage"]
body:
  - type: input
    id: location
    attributes:
      label: Documentation location
      description: Provide a file path or public URL.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What needs improvement?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
